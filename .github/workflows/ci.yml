name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,interpret]"
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: pytest -q
      - name: Smoke-run the offline pipeline
        run: python scripts/run_demo.py --outdir results --seed 7 --bootstrap 200
      - name: Upload result figures
        uses: actions/upload-artifact@v4
        with:
          name: epibarrett-results-${{ matrix.python-version }}
          path: results/
